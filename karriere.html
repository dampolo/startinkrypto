<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-2QZ5FHX5L9"></script>

    <title>Start in Krypto - Karriere</title>

    <meta name="author" content="Start Krypto" />
    <meta name="description" content="Starte mit Start in Krypto in die Welt der Kryptowährungen – einfach, sicher und verständlich." />
    <meta name="keywords" content="Krypto, Kryptowährungen, Blockchain, Bitcoin, Ethereum, Start in Krypto, Wallet, Investment" />
    <meta name="robots" content="index, follow" />
    
    
    <meta property="og:locale" content="de_DE">
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Start in Krypto – Dein Einstieg in die Krypto-Welt." />
    <meta property="og:description" content="Einfach & sicher in Kryptowährungen investieren. Mit Start in Krypto durchstarten." />
    <meta property="og:image" content="./assets/SK-metatag.png" />
    <meta property="og:url" content="https://startinkrypto.de" />

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="./assets/SK-metatag.png">

    <link rel="shortcut icon" href="./assets/SK-favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="./styles/styles.css">
  </head>

  <body>
    <header class="header" w3-include-html="templates/header.html"></header>
    <main>

      <section class="career">
            <div class="career-content">
                <a href="/">
                <img class="strong-arrow" src="./assets/arrow.svg" alt="Zurück auf die Hauptseite">
                </a>
                <h1>Karriere</h1>
            </div>

            <label class="control-label" for="applicationform-title">Anrede</label>
            <select id="applicationform-title" autocomplete="honorific-prefix">
                <option value="">Keine Angabe</option>
                <option value="Mr.">Herr</option>
                <option value="Ms.">Frau</option>
                <option value="Diverse">Divers</option>
            </select>

            <!-- First Name -->
            <div class="form-group field-applicationform-firstname required">
                <label class="control-label" for="applicationform-firstname">Vorname</label>
                <input type="text" id="applicationform-firstname" class="form-control" name="applicationform-firstname" required="required" autocomplete="given-name" aria-required="true">

                <p class="help-block help-block-error"></p>
            </div>

            <div class="form-group field-applicationform-lastname required">
                <label class="control-label" for="applicationform-lastname">Nachname</label>
                <input type="text" id="applicationform-lastname" class="form-control" name="applicationform-lastname" required="required" autocomplete="family-name" aria-required="true">

                <p class="help-block help-block-error"></p>
            </div>

            <div class="form-group field-applicationform-email required">
                <label class="control-label" for="applicationform-email">E-Mail-Adresse</label>
                <input type="text" id="applicationform-email" class="form-control" name="applicationform-email" required="required" autocomplete="email" aria-required="true">

                <p class="help-block help-block-error"></p>
            </div>

            <div class="form-group field-applicationform-phonenumber required">
                <label class="control-label" for="applicationform-phonenumber">Telefonnummer</label>
                <input type="text" id="applicationform-phonenumber" class="form-control" name="applicationform-phonenumber" required="required" autocomplete="tel" aria-required="true">

                <p class="help-block help-block-error"></p>
            </div>

            <div class="fileContainer">

                <div class="fileInput">
                
                    <div class="form-group field-applicationform-file_cv required">
                        <label class="control-label" for="applicationform-file_cv">Bewerbungsunterlagen</label>
                        <input type="hidden" name="ApplicationForm[file_cv][]" value="">
                        <div class="fileuploader fileuploader-theme-default">
                            <input type="hidden" name="fileuploader-list-file_cv" value="[]">
                            <input type="file" id="applicationform-file_cv" class="defaultFileInput" name="ApplicationForm[file_cv][]" multiple="multiple" data-file-name="file_cv" data-fileuploader-max-file-size="20971520" data-js-fileuploader="upgraded-field" required="required" aria-required="true">
                            <div class="fileuploader-input">
                                
                                <div class="fileuploader-input-caption">
                                    <span>Wählen Sie Dateien zum Hochladen aus</span>
                                </div>

                                <button type="button" class="fileuploader-input-button">
                                    <span>Dateien auswählen</span>
                                </button>
                                
                            </div>

                            <div class="fileuploader-items">
                                <ul class="fileuploader-items-list">

                                </ul>
                            </div>
                        </div>
                        <p class="help-block help-block-error"></p>
                    </div>            
                
                    <p class="help-block help-block-error">
                    Erlaubte Datei Formate: xls, xlsx, ods, pdf, jpeg, jpg, gif, png            
                    </p>
                    <div class="file-information">

                    </div>
                </div>
            </div>

            <div class="">
                <div class="form-group required">
                    <label class="control-label required">
                        Hinweise zur Datenschutzerklärung    
                    </label>

                    <div class="form-group field-applicationform-termsandconditions required">
                        <div class="checkbox">
                        
                        <label for="applicationform-termsandconditions">
                        <input type="checkbox" id="applicationform-termsandconditions" name="ApplicationForm[termsAndConditions]" value="1" aria-required="true">
                        Ich habe die erforderlichen Datenschutzinformationen zur Kenntnis genommen.<br>Zu unserer Datenschutzbestimmung gelangen Sie <a href="https://www.w11k.de/impressum#datenschutz" target="_blank"> hier </a>
                        </label>
                        <p class="help-block help-block-error"></p>

                        </div>
                    </div>
                </div>

                <div>
                    <button type="submit" class="" name="login-button">Bewerben</button>
                </div>
            </div>

        </section>
      </main>
    <footer class="footer" w3-include-html="templates/footer.html"></footer>
        <div class="error">
          <div class="error-type"></div>
        </div>

    <script src="./scripts/script.js"></script>
  </body>
</html>
